<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F2120">
  <title>Музыка семьи — Mednov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preload" as="image" href="logo-mark.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Preloader -->
  <div class="preloader">
    <img src="logo-mark.svg" alt="Mednov" class="preloader-logo">
    <div class="preloader-bar"></div>
  </div>

  <div class="noise-overlay"></div>
  <div class="scroll-progress"></div>
  <div class="cursor-glow"></div>

  <!-- Global background -->
  <div class="global-bg">
    <div class="hero-orb"></div>
    <div class="hero-orb"></div>
  </div>

  <nav class="nav">
    <a href="index.html" class="nav-logo"><img src="logo-mark.svg" alt="Mednov"></a>
    <div class="nav-links">
      <a href="index.html">Главная</a>
      <a href="music.html" class="active">Музыка</a>
      <a href="games.html">Игры</a>
      <a href="birthday.html" class="bday-nav-banner">
        <span class="bday-banner-badge">10 мая</span>
        <span class="bday-banner-text">Приглашение на юбилей &rarr;</span>
      </a>
    </div>
    <div class="nav-burger"><span></span><span></span><span></span></div>
  </nav>

  <!-- Slide 1: Hero — only "Музыка" particles fullscreen + subtitle -->
  <section class="slide">
    <div id="particles-title" class="particles-title-fullscreen" data-text="Музыка"></div>
    <p class="music-hero-sub">Саундтреки жизни</p>
  </section>

  <!-- Slide 2: Альбомы -->
  <section class="slide slide-textured">
    <p class="music-hero-sub">Коллекция</p>
    <div class="pattern-bg"></div>
    <div class="slide-inner">
      <div class="reveal" style="text-align:center;">
        <h2 class="section-title" style="margin-bottom:0.5rem;">Альбомы</h2>
      </div>
      <div id="album-carousel" class="album-carousel"></div>
      <div id="album-info" class="album-info">
        <div class="album-info-title">45/20</div>
        <div class="album-info-artist">Сергей Меднов</div>
      </div>
      <div id="carousel-dots" class="carousel-dots"></div>
    </div>
  </section>

  <!-- Slide 3: Плейлисты -->
  <section class="slide">
    <p class="music-hero-sub">Подборки</p>
    <div class="pattern-bg"></div>
    <div class="slide-inner">
      <div class="reveal" style="text-align:center;">
        <h2 class="section-title" style="margin-bottom:0.5rem;">Плейлисты</h2>
      </div>
      <div id="playlist-carousel" class="album-carousel"></div>
      <div id="playlist-info" class="album-info">
        <div class="album-info-title">Утренний фокус</div>
        <div class="album-info-artist">Ambient & Piano · 24 трека</div>
      </div>
      <div id="playlist-dots" class="carousel-dots"></div>
      <footer class="slide-footer">
        <a href="ringtones.html" style="display:inline-flex;align-items:center;gap:0.4rem;font-family:var(--font-main);font-size:0.75rem;font-weight:600;color:var(--turquoise);text-decoration:none;margin-bottom:0.5rem;pointer-events:auto;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.05 5A5 5 0 0 1 19 8.95M15.05 1A9 9 0 0 1 23 8.94M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Рингтоны →
        </a>
        <img src="logo-mark.svg" alt="Mednov" class="footer-logo" loading="lazy" decoding="async">
        <p>Family Office &copy; 2024 — Объединяя поколения</p>
      </footer>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="script.js"></script>
  <script src="album-carousel.js"></script>
  <script src="particles-text.js"></script>
  <script src="slide-controller.js"></script>
</body>
</html>
