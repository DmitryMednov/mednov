<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Музыка семьи — Mednov</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html { scroll-snap-type: y mandatory; }
    .slide {
      min-height:100vh; scroll-snap-align:start;
      display:flex; flex-direction:column; justify-content:center;
      position:relative; overflow:hidden;
    }
    .slide .pattern-bg { position:absolute; inset:0; pointer-events:none; z-index:0; }
    .slide-inner {
      position:relative; z-index:1; width:100%;
      padding:6rem 3rem 3rem;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      flex:1;
    }
    /* Hero slide: left-aligned */
    .slide-hero .slide-inner {
      align-items:flex-start; justify-content:flex-end;
      padding-bottom:4rem;
    }
    /* Carousel fills most of the slide */
    .slide .album-carousel { height:50vh; max-height:500px; }
    @media(max-width:768px) {
      .slide-inner { padding:5rem 1.5rem 2rem; }
      .slide .album-carousel { height:40vh; }
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="scroll-progress"></div>
  <div class="cursor-glow"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo"><img src="logo-mark.svg" alt="Mednov"></a>
    <div class="nav-links">
      <a href="index.html">Главная</a>
      <a href="music.html" class="active">Музыка</a>
      <a href="games.html">Игры</a>
    </div>
    <div class="nav-burger"><span></span><span></span><span></span></div>
  </nav>

  <!-- Slide 1: Hero -->
  <section class="slide slide-hero" style="background:linear-gradient(180deg, var(--dark-green), var(--deep-green));">
    <div class="pattern-bg"></div>
    <div class="slide-inner">
      <div class="visualizer" style="opacity:0;animation:fadeUp 0.8s 0.3s var(--ease) forwards;">
        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
      </div>
      <h1 class="hero-title split-words" style="text-align:left;opacity:0;animation:fadeUp 0.8s 0.5s var(--ease) forwards;">
        Музыка <span class="hi">семьи</span>
      </h1>
      <p class="hero-sub" style="text-align:left;margin:0;opacity:0;animation:fadeUp 0.8s 0.7s var(--ease) forwards;">
        Саундтрек нашей жизни. Все альбомы и плейлисты.
      </p>
    </div>
  </section>

  <!-- Slide 2: Альбомы -->
  <section class="slide" style="background:var(--deep-green);">
    <div class="pattern-bg"></div>
    <div class="slide-inner">
      <div class="reveal" style="text-align:center;">
        <p class="section-label">Коллекция</p>
        <h2 class="section-title" style="margin-bottom:0.5rem;">Альбомы</h2>
      </div>
      <div id="album-carousel" class="album-carousel"></div>
      <div id="album-info" class="album-info">
        <div class="album-info-title">45/20</div>
        <div class="album-info-artist">Сергей Меднов</div>
      </div>
      <div id="carousel-dots" class="carousel-dots"></div>
    </div>
  </section>

  <!-- Slide 3: Плейлисты -->
  <section class="slide" style="background:var(--dark-green);">
    <div class="pattern-bg"></div>
    <div class="slide-inner">
      <div class="reveal" style="text-align:center;">
        <p class="section-label">Подборки</p>
        <h2 class="section-title" style="margin-bottom:0.5rem;">Плейлисты</h2>
      </div>
      <div id="playlist-carousel" class="album-carousel"></div>
      <div id="playlist-info" class="album-info">
        <div class="album-info-title">Утренний фокус</div>
        <div class="album-info-artist">Ambient & Piano · 24 трека</div>
      </div>
      <div id="playlist-dots" class="carousel-dots"></div>
    </div>
  </section>

  <footer class="footer" style="scroll-snap-align:end;">
    <img src="logo-mark.svg" alt="Mednov" class="footer-logo">
    <p>Family Office &copy; 2024 — Объединяя поколения</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="script.js"></script>
  <script src="album-carousel.js"></script>
  <script src="pixel-transition.js"></script>
</body>
</html>
