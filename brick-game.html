<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Brick Game v2.0 — Mednov</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%;
      min-height:100vh;
      min-height:100dvh;
      overflow:auto;
      background:#111;
      -webkit-text-size-adjust:100%;
    }
    body {
      display:flex;
      align-items:center;
      justify-content:center;
      padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #root {
      width:100%;
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    /* Scale the game wrapper to fit short screens */
    #root > div {
      transform-origin:center center;
      transform:scale(var(--game-scale, 1));
    }
    .back-link {
      position:fixed; top:max(12px, env(safe-area-inset-top)); left:max(12px, env(safe-area-inset-left)); z-index:9999;
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 16px; border-radius:24px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1);
      color:#aaa; font-family:'Courier New',monospace; font-size:12px; font-weight:600;
      text-decoration:none; transition:all 0.3s;
    }
    .back-link:hover { background:rgba(255,255,255,0.15); color:#fff; }
    .back-link svg { width:14px; height:14px; }
  </style>
  <script>
    /* Scale brick game to fit current viewport */
    function scaleGame() {
      const GAME_HEIGHT = 720;
      const GAME_WIDTH = 400;
      const availH = window.innerHeight - 32;
      const availW = window.innerWidth - 32;
      const scale = Math.min(1, availH / GAME_HEIGHT, availW / GAME_WIDTH);
      document.documentElement.style.setProperty('--game-scale', scale.toFixed(3));
    }
    window.addEventListener('resize', scaleGame);
    window.addEventListener('orientationchange', scaleGame);
    window.addEventListener('DOMContentLoaded', () => {
      scaleGame();
      // Re-scale after React mounts and adjusts content
      setTimeout(scaleGame, 100);
      setTimeout(scaleGame, 500);
    });
  </script>
</head>
<body>
  <a href="games.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    Назад
  </a>
  <div id="root"></div>

  <!-- React локально (vendor/), код игры скомпилирован заранее (esbuild) — без Babel в браузере -->
  <script src="vendor/react-18.2.0.min.js"></script>
  <script src="vendor/react-dom-18.2.0.min.js"></script>

  <script src="brick-game.js"></script>
</body>
</html>
