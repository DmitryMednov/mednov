<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F2120">
  <title>Mednov Family Office</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="scroll-progress"></div>
  <div class="cursor-glow"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo"><img src="logo-mark.svg" alt="Mednov"></a>
    <div class="nav-links">
      <a href="index.html" class="active">Главная</a>
      <a href="music.html">Музыка</a>
      <a href="games.html">Игры</a>
    </div>
    <div class="nav-burger"><span></span><span></span><span></span></div>
  </nav>

  <!-- Slide 1: Hero — 3D scene + logo -->
  <section class="slide" style="background:var(--dark-green);">
    <div class="hero-bg">
      <div class="hero-orb"></div>
      <div class="hero-orb"></div>
    </div>
    <div id="hero-3d" class="hero-3d-canvas"></div>
    <div class="hero-scroll"><span>Scroll</span><div class="hero-scroll-line"></div></div>
  </section>

  <!-- Slide 2: Philosophy (Вайб) — с анимированным WebGL-элементом -->
  <section class="slide" style="background:var(--dark-green);" id="philosophy">
    <div class="pattern-bg"></div>
    <div class="slide-inner">
      <div class="philosophy-grid">
        <div class="philosophy-text reveal-left">
          <p class="section-label">Вайб</p>
          <h2 class="section-title split-lines">Творческое<br>начало семьи</h2>
          <p class="section-text">Музыка, игры, технологии — всё начинается с точки отсчёта.</p>
        </div>
        <div class="philosophy-visual reveal-right">
          <div id="philosophy-canvas" class="philosophy-canvas"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Slide 3: Directions — полноэкранные плашки с анимациями -->
  <section class="slide" style="background:var(--dark-green);">
    <div class="slide-inner slide-inner-directions">
      <div class="reveal directions-header">
        <p class="section-label">Направления</p>
        <h2 class="section-title split-chars">Мир Mednov</h2>
      </div>
      <div class="direction-tiles">
        <a href="music.html" class="direction-tile direction-tile-music">
          <canvas class="direction-anim" data-anim="music"></canvas>
          <div class="direction-tile-content">
            <div class="direction-tile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
            </div>
            <h3>Музыка</h3>
            <p>Саундтрек семьи</p>
            <span class="direction-tile-cta">
              Слушать
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </span>
          </div>
        </a>
        <a href="games.html" class="direction-tile direction-tile-games">
          <canvas class="direction-anim" data-anim="games"></canvas>
          <div class="direction-tile-content">
            <div class="direction-tile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="6" width="20" height="12" rx="2"/>
                <path d="M6 12h4"/>
                <path d="M8 10v4"/>
                <circle cx="17" cy="10" r="1"/>
                <circle cx="15" cy="14" r="1"/>
              </svg>
            </div>
            <h3>Игры</h3>
            <p>Играй в браузере</p>
            <span class="direction-tile-cta">
              Играть
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </span>
          </div>
        </a>
      </div>
      <footer class="slide-footer">
        <img src="logo-mark.svg" alt="Mednov" class="footer-logo">
        <p>Family Office &copy; 2024 — Объединяя поколения</p>
      </footer>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="script.js"></script>
  <script src="hero-3d.js"></script>
  <script src="philosophy-scene.js"></script>
  <script src="direction-tiles.js"></script>
  <script src="slide-controller.js"></script>
</body>
</html>
